<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foamico Gallery — Dealer Registration Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#1A1A1A; --charcoal:#2B2B2B; --kiwi:#95C12B; --avocado:#3F5E12;
  --calm:#E4F2C5; --sand:#9D9E9E; --egg:#FEFEFE; --slate:#6B6B6B;
  --lgrey:#DDDDDD; --mist:#F2F4EC; --paper:#F6F8F1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,system-ui,sans-serif;background:var(--mist);color:var(--black);-webkit-font-smoothing:antialiased}

.topbar{background:var(--black);padding:14px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.mark{font-family:Montserrat;font-weight:800;font-size:17px;color:var(--egg);letter-spacing:.14em}
.mark span{color:var(--kiwi)}
.kick{font-size:10px;letter-spacing:.18em;color:var(--kiwi);font-family:Montserrat;font-weight:500;text-transform:uppercase}
.spacer{margin-left:auto}
.tgl{display:flex;border:1px solid #3d3d3d;border-radius:999px;overflow:hidden}
.tgl button{background:none;border:0;color:var(--sand);font-family:Poppins;font-size:12px;padding:6px 14px;cursor:pointer}
.tgl button.on{background:var(--kiwi);color:var(--black)}
.ghost{background:none;border:1px solid #3d3d3d;color:var(--sand);font-family:Poppins;font-size:12px;padding:6px 14px;border-radius:999px;cursor:pointer}
.ghost:hover{border-color:var(--kiwi);color:var(--kiwi)}

.wrap{max-width:900px;margin:0 auto;padding:34px 20px 60px;display:flex;gap:34px;align-items:flex-start;justify-content:center}

.device{width:330px;flex:0 0 330px;background:var(--egg);border:1px solid var(--lgrey);border-radius:22px;overflow:hidden}
.dhead{background:var(--black);padding:15px 18px}
.dstep{font-size:10px;letter-spacing:.16em;color:var(--kiwi);font-family:Montserrat;font-weight:500;text-transform:uppercase}
.dtitle{font-family:Montserrat;font-weight:700;font-size:16px;color:var(--egg);margin-top:3px}
.track{height:3px;background:var(--avocado);border-radius:2px;margin-top:12px}
.fill{height:3px;background:var(--kiwi);border-radius:2px;width:12%;transition:width .3s ease}
.dbody{padding:18px;background:var(--paper);min-height:430px}

label,.lab{display:block;font-size:11px;color:var(--slate);margin:0 0 6px;line-height:1.5}
.req{color:var(--avocado)}
input[type=text],input[type=email],input[type=tel],input[type=number]{width:100%;background:var(--egg);border:1px solid var(--lgrey);border-radius:9px;padding:10px 11px;font-family:Poppins;font-size:13.5px;color:var(--black);margin:0 0 14px}
input:focus{outline:none;border-color:var(--kiwi);box-shadow:0 0 0 3px rgba(149,193,43,.2)}
input::placeholder{color:var(--sand)}
input:disabled{background:var(--mist);color:var(--sand)}
.err{border-color:#C0392B !important;box-shadow:0 0 0 3px rgba(192,57,43,.15) !important}
.errbanner{background:#FBEAEA;border:1px solid #C0392B;color:#C0392B;border-radius:9px;padding:10px 12px;margin:0 0 14px;font-size:12px;line-height:1.5}
.row{display:flex;gap:9px}
.row>div{flex:1;min-width:0}

.info{background:var(--calm);border-radius:9px;padding:11px 12px;margin:0 0 14px;font-size:12px;color:var(--avocado);line-height:1.65}
.info strong{font-weight:500}
.plain{background:var(--egg);border:1px solid var(--lgrey);color:var(--black)}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 14px}
.chip{border:1px solid var(--lgrey);background:var(--egg);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--slate);cursor:pointer;user-select:none;transition:all .12s}
.chip:hover{border-color:var(--sand)}
.chip.on{background:var(--kiwi);border-color:var(--kiwi);color:var(--black)}

.pin{background:var(--egg);border:1px dashed var(--sand);border-radius:9px;padding:14px;text-align:center;font-size:12.5px;color:var(--avocado);cursor:pointer;margin:0 0 14px}
.pin.done{border-style:solid;border-color:var(--kiwi)}

.doc{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:var(--egg);border:1px solid var(--lgrey);border-radius:9px;padding:11px 12px;margin:0 0 8px;font-size:12.5px}
.doc.done{border-color:var(--kiwi)}
.doc .tick{margin-left:auto;color:var(--lgrey);font-weight:500}
.doc.done .tick{color:var(--kiwi)}
.icn{width:15px;height:15px;flex:0 0 15px;border:1.5px solid var(--sand);border-radius:3px}
.doc.done .icn{border-color:var(--kiwi)}
.docactions{flex-basis:100%;display:flex;gap:16px;margin-top:2px}
.doclink{font-size:11.5px;color:var(--avocado);text-decoration:underline;cursor:pointer;user-select:none}
.doclink:hover{color:var(--kiwi)}

.hero{background:var(--black);border-radius:14px;padding:17px;margin:0 0 14px}
.hero b{display:block;font-family:Montserrat;font-weight:800;font-size:32px;color:var(--kiwi);line-height:1}
.hero p{font-size:12px;color:var(--sand);line-height:1.65;margin-top:7px}

.rsec-title{font-family:Montserrat;font-weight:700;font-size:12px;color:var(--black);margin:4px 0 12px;text-transform:uppercase;letter-spacing:.04em}
.rwd{display:flex;gap:11px;margin:0 0 14px}
.rwd .num{width:24px;height:24px;border-radius:50%;background:var(--kiwi);color:var(--black);font-family:Montserrat;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 24px}
.rwd .rtext b{display:block;font-family:Montserrat;font-weight:700;font-size:12.5px;color:var(--black);margin-bottom:2px}
.rwd .rtext p{font-size:11.5px;color:var(--slate);line-height:1.5}

.declare{display:flex;gap:11px;background:var(--calm);border-radius:9px;padding:13px;margin:0 0 14px;cursor:pointer;border:1px solid transparent}
.declare.err{border-color:var(--avocado)}
.cbox{width:19px;height:19px;flex:0 0 19px;border:1.5px solid var(--avocado);border-radius:4px;background:var(--egg);margin-top:1px;position:relative}
.declare.on .cbox{background:var(--kiwi);border-color:var(--kiwi)}
.declare.on .cbox::after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid var(--black);border-width:0 2px 2px 0;transform:rotate(45deg)}
.dtext{font-size:11.5px;color:var(--avocado);line-height:1.65}

.summary{background:var(--egg);border:1px solid var(--lgrey);border-radius:9px;padding:12px;margin:0 0 14px;font-size:12.5px;line-height:1.75}
.summary em{font-style:normal;color:var(--slate)}

.cta{width:100%;background:var(--kiwi);color:var(--black);border:0;border-radius:999px;padding:13px;font-family:Poppins;font-weight:500;font-size:13.5px;cursor:pointer}
.cta:hover{background:#89b325}
.cta:disabled{background:var(--lgrey);color:var(--sand);cursor:not-allowed}
.back{background:none;border:0;color:var(--slate);font-family:Poppins;font-size:12px;cursor:pointer;padding:10px 0 0;display:block;margin:0 auto}

.notes{flex:1;min-width:0;max-width:330px}
.notes h3{font-family:Montserrat;font-weight:700;font-size:13px;margin:0 0 14px;letter-spacing:.02em}
.nk{font-size:10px;letter-spacing:.14em;color:var(--sand);text-transform:uppercase;font-family:Montserrat;font-weight:500;margin:0 0 4px}
.nv{font-size:13px;color:var(--slate);line-height:1.65;margin:0 0 18px}
.hidden{display:none}

.done-wrap{text-align:center;padding:26px 6px}
.done-ring{width:58px;height:58px;border-radius:50%;background:var(--kiwi);margin:0 auto 18px;position:relative}
.done-ring::after{content:"";position:absolute;left:21px;top:15px;width:11px;height:22px;border:solid var(--black);border-width:0 3px 3px 0;transform:rotate(45deg)}
.done-wrap h4{font-family:Montserrat;font-weight:800;font-size:19px;margin-bottom:8px}
.done-wrap p{font-size:12.5px;color:var(--slate);line-height:1.7;margin-bottom:18px}
.wa{background:var(--egg);border:1px solid var(--lgrey);border-radius:9px;padding:13px;text-align:left;font-size:12px;line-height:1.7;color:var(--black)}
.wa span{color:var(--sand);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-family:Montserrat;font-weight:500}

.foot{text-align:center;font-size:11px;color:var(--sand);padding:0 20px 34px}

@media (max-width:760px){
  .wrap{flex-direction:column;align-items:center;gap:24px}
  .notes{max-width:330px;width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="mark">FOAMICO<span>.</span></div>
  <div class="kick">Gallery enrolment · prototype</div>
  <div class="spacer"></div>
  <div class="tgl">
    <button id="l-en" class="on" onclick="setLang('en')">English</button>
    <button id="l-hi" onclick="setLang('hi')">हिंदी</button>
  </div>
  <button class="ghost" onclick="toggleNotes()" id="notebtn">Hide notes</button>
</div>

<div class="wrap">
<div class="device">
  <div class="dhead">
    <div class="dstep" id="stepno">Step 1 of 8</div>
    <div class="dtitle" id="steptitle">Verify your number</div>
    <div class="track"><div class="fill" id="fill"></div></div>
  </div>
  <div class="dbody" id="body"></div>
</div>

<div class="notes" id="notes">
  <h3 id="ntitle">Design notes</h3>
  <div id="nbody"></div>
</div>
</div>

<p class="foot">FOAMICO · From the house of LPPL · Legend Polyfoams Pvt. Ltd. · Gallery enrolment prototype FY 2026–27</p>

<script>
var lang = 'en';
var step = 0;
var state = { docs: {}, pin: false, confirmed: false, unmarried: false, accept: false, fields: {} };

var T = {
  cont:      ['Continue', 'आगे बढ़ें'],
  back:      ['Back', 'पीछे'],
  req:       [' · required', ' · आवश्यक'],
  notes:     ['Design notes', 'डिज़ाइन नोट्स'],
  hide:      ['Hide notes', 'नोट्स छिपाएँ'],
  show:      ['Show notes', 'नोट्स दिखाएँ'],
  stepof:    ['Step # of 8', 'चरण # / 8'],
  errmsg:    ['Please check the highlighted fields before continuing.', 'कृपया आगे बढ़ने से पहले हाइलाइट किए गए फ़ील्ड जाँचें।']
};
function t(k){ return T[k][lang === 'en' ? 0 : 1]; }

var STEPS = [
{
  title: ['Verify your number', 'अपना नंबर सत्यापित करें'],
  html: function(){ return ''
   + card('plain', ['Become a Foamico Authorised branded display and unlock the full reward stack — free pairs, marketing support and the International Foamico Vision Trip.',
                    'फोमिको अधिकृत ब्रांडेड डिस्प्ले बनें और पूरा रिवॉर्ड पैकेज पाएं — मुफ़्त जोड़े, मार्केटिंग सहायता और इंटरनेशनल फोमिको विज़न ट्रिप।'])
   + lab(['Your mobile number (WhatsApp)', 'आपका मोबाइल नंबर (व्हाट्सएप)'], true)
   + txt('f-mobile', 'tel', '98765 43210')
   + lab(['Enter the 6-digit code we sent', 'भेजा गया 6 अंकों का कोड डालें'], false)
   + txt('f-otp', 'text', '419273', ' maxlength="6" style="letter-spacing:.5em"')
   + card('', ['<strong>Number verified.</strong> This is the only code you will be asked for.',
               '<strong>नंबर सत्यापित हुआ।</strong> आपसे केवल यही कोड माँगा जाएगा।'])
   + lab(['Which language do you prefer?', 'आप कौन सी भाषा पसंद करेंगे?'], false)
   + '<div class="chips" id="langChips">'
   + '<span class="chip' + (lang === 'en' ? ' on' : '') + '" onclick="setLang(\'en\')">English</span>'
   + '<span class="chip' + (lang === 'hi' ? ' on' : '') + '" onclick="setLang(\'hi\')">हिंदी</span>'
   + '</div>';
  },
  validate: function(){
   var errs = [];
   if (digitsOnly(getVal('f-mobile')).length !== 10) errs.push('f-mobile');
   return errs;
  },
  notes: [
   [['The only OTP in the form','फॉर्म में इकलौता ओटीपी'],
    ['It opens a verified session that stays open through all eight steps. The dealer never looks at his SMS twice.',
     'यह एक सत्यापित सत्र खोलता है जो आठों चरणों तक चलता है। डीलर को दोबारा एसएमएस नहीं देखना पड़ता।']],
   [['The line at the top','ऊपर की पंक्ति'],
    ['The commitment sits at step 7, so the dealer must not meet it for the first time after shooting six documents. One sentence here removes the surprise.',
     'प्रतिबद्धता चरण 7 पर है, इसलिए डीलर को छह दस्तावेज़ों के बाद पहली बार यह पता नहीं चलना चाहिए। यहाँ एक वाक्य वह आश्चर्य हटा देता है।']]
  ]
},
{
  title: ['Your business', 'आपका व्यापार'],
  html: function(){ return ''
   + lab(['GST number', 'जीएसटी नंबर'], true)
   + txt('f-gst', 'text', '09ABCDE1234F2Z5', ' maxlength="15" style="letter-spacing:.06em;text-transform:uppercase"')
   + card('', ['Proprietorship · registered 2016 · active<br>Hazratganj, Lucknow<br>Uttar Pradesh 226001',
               'प्रोपराइटरशिप · 2016 में पंजीकृत · सक्रिय<br>हज़रतगंज, लखनऊ<br>उत्तर प्रदेश 226001'])
   + lab(['Firm name', 'फर्म का नाम'], true)
   + txt('f-firmname', 'text', 'Sunita Bedding House')
   + lab(['Name to print on your signboard', 'साइनबोर्ड पर छपने वाला नाम'], true)
   + txt('f-signboard', 'text', 'Sunita Bedding House');
  },
  validate: function(){
   var errs = [];
   if (!/^[A-Za-z0-9]{15}$/.test(getVal('f-gst'))) errs.push('f-gst');
   if (!getVal('f-firmname')) errs.push('f-firmname');
   if (!getVal('f-signboard')) errs.push('f-signboard');
   return errs;
  },
  notes: [
   [['One number, one screen','एक नंबर, एक स्क्रीन'],
    ['Fifteen characters fill the constitution, full address, PIN, state and registration year. None of it can be misspelt because none of it is typed.',
     'पंद्रह अक्षर संविधान, पूरा पता, पिन, राज्य और पंजीकरण वर्ष भर देते हैं। कुछ भी टाइप नहीं होता, इसलिए कुछ भी गलत नहीं लिखा जा सकता।']],
   [['Why the signboard name is separate','साइनबोर्ड का नाम अलग क्यों'],
    ['Marketing prints this one. It is usually shorter than the registered name, and getting it wrong wastes a board.',
     'मार्केटिंग इसी को छापती है। यह आमतौर पर पंजीकृत नाम से छोटा होता है, और गलती से एक बोर्ड बर्बाद होता है।']]
  ]
},
{
  title: ['Owner details', 'मालिक का विवरण'],
  html: function(){ return ''
   + lab(["Owner's full name", 'मालिक का पूरा नाम'], true)
   + txt('f-ownername', 'text', 'Ramesh Gupta')
   + '<div class="row"><div>' + lab(['Date of birth','जन्म तिथि'], true) + txt('f-dob', 'text', '14 / 03 / 1974') + '</div>'
   + '<div>' + lab(['Anniversary','सालगिरह'], !state.unmarried)
     + txt('f-anniv', 'text', state.unmarried ? '' : '28 / 11 / 1999', state.unmarried ? ' disabled placeholder="—"' : '') + '</div></div>'
   + '<div class="chips" id="marriedGroup" style="justify-content:center">'
   + '<span class="chip' + (state.unmarried ? ' on' : '') + '" onclick="toggleMarried()">' + (lang==='en'?'Unmarried':'अविवाहित') + '</span></div>'
   + '<div class="row"><div>' + lab(['Alternate Number','वैकल्पिक नंबर'], false) + txt('f-altnum', 'tel', '99887 76655') + '</div>'
   + '<div>' + lab(['Email','ईमेल'], true) + txt('f-email', 'email', 'ramesh.gupta@example.com') + '</div></div>'
   + lab(['Pincode', 'पिन कोड'], true)
   + txt('f-pincode', 'text', '226001', ' maxlength="6"')
   + card('', ['Lucknow · Uttar Pradesh', 'लखनऊ · उत्तर प्रदेश'])
   + lab(['Firm Address', 'फर्म का पता'], true)
   + txt('f-address', 'text', '14/3 Rana Pratap Marg')
   + lab(['Landmark', 'पास की पहचान'], true)
   + txt('f-landmark', 'text', 'Behind Sahara Ganj');
  },
  validate: function(){
   var errs = [];
   if (!getVal('f-ownername')) errs.push('f-ownername');
   if (!getVal('f-dob')) errs.push('f-dob');
   if (!state.unmarried && !getVal('f-anniv')) errs.push('f-anniv');
   if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(getVal('f-email'))) errs.push('f-email');
   if (digitsOnly(getVal('f-pincode')).length !== 6) errs.push('f-pincode');
   if (!getVal('f-address')) errs.push('f-address');
   if (!getVal('f-landmark')) errs.push('f-landmark');
   return errs;
  },
  notes: [
   [['A compulsory step','अनिवार्य चरण'],
    ['Nothing advances until this is complete. Owner name, date of birth, email, pincode, firm address and landmark are all required — only the anniversary and the alternate number are not.',
     'जब तक यह पूरा न हो, आगे नहीं बढ़ा जा सकता। मालिक का नाम, जन्म तिथि, ईमेल, पिन कोड, फर्म का पता और पास की पहचान — सब आवश्यक हैं — केवल सालगिरह और वैकल्पिक नंबर आवश्यक नहीं।']],
   [['Why "Unmarried" exists','"अविवाहित" क्यों है'],
    ['Without an escape, a compulsory anniversary traps every unmarried or widowed dealer — and your salesperson will simply invent a date to get past the screen. Ticking it removes the anniversary requirement entirely.',
     'बिना विकल्प के, अनिवार्य सालगिरह हर अविवाहित या विधुर डीलर को रोक देगी — और आपका सेल्समैन आगे बढ़ने के लिए कोई तारीख गढ़ लेगा। इसे टिक करने से सालगिरह की आवश्यकता पूरी तरह हट जाती है।']],
   [['Two dates, no family','दो तारीखें, परिवार नहीं'],
    ['The owner only. Nothing about spouse or children — that data carries real obligations under the DPDP Act and earns you nothing.',
     'केवल मालिक की। पति/पत्नी या बच्चों की कोई जानकारी नहीं — उस डेटा पर डीपीडीपी कानून के तहत असली ज़िम्मेदारी आती है और लाभ कुछ नहीं।']]
  ]
},
{
  title: ['Your shop', 'आपकी दुकान'],
  html: function(){ return ''
   + lab(['Shop location', 'दुकान का स्थान'], true)
   + '<div class="pin' + (state.pin ? ' done' : '') + '" onclick="dropPin()">'
     + (state.pin ? (lang==='en' ? 'Pin saved · 26.8467, 80.9462' : 'पिन सहेजा गया · 26.8467, 80.9462')
                  : (lang==='en' ? 'Drop a pin, or paste a Maps link' : 'पिन लगाएँ, या मैप्स लिंक पेस्ट करें')) + '</div>'
   + (state.pin ? card('', ['Open 10am to 8:30pm · visit GPS and time recorded',
                            'सुबह 10 से रात 8:30 तक खुली · दौरे का जीपीएस और समय दर्ज']) : '')
   + lab(['Size of your shop', 'दुकान का आकार'], false)
   + chips('size', [['Under 200','200 से कम'],['200–500','200–500'],['500–1000','500–1000'],['1000+ sq ft','1000+ वर्ग फुट']], 1)
   + lab(['How many Display Mattresses do you require?', 'आपको कितने डिस्प्ले गद्दे चाहिए?'], true)
   + txt('f-dispcount', 'number', '7', ' min="0" max="7" step="1"')
   + lab(['How many mattress salesperson work here?', 'यहाँ कितने गद्दा सेल्सपर्सन काम करते हैं?'], true)
   + txt('f-staff', 'number', '2', ' min="0" step="1"');
  },
  validate: function(){

function lab(pair, required){
  return '<span class="lab">' + pair[lang==='en'?0:1]
       + (required ? '<span class="req">' + t('req') + '</span>' : '') + '</span>';
}
function card(cls, pair){
  return '<div class="info ' + cls + '">' + pair[lang==='en'?0:1] + '</div>';
}
function rwd(num, titlePair, descPair){
  return '<div class="rwd"><div class="num">' + num + '</div><div class="rtext"><b>'
       + titlePair[lang==='en'?0:1] + '</b><p>' + descPair[lang==='en'?0:1] + '</p></div></div>';
}
function chips(group, items, selected){
  var multi = selected === -2;
  var preset = { brands: [0,1,4] };
  var h = '<div class="chips" data-group="' + group + '">';
  for (var i = 0; i < items.length; i++){
    var on = multi ? (preset[group] || []).indexOf(i) > -1 : i === selected;
    h += '<span class="chip' + (on ? ' on' : '') + '" onclick="pickChip(this,' + multi + ')">'
       + items[i][lang==='en'?0:1] + '</span>';
  }
  return h + '</div>';
}
function doc(key, pair){
  var done = !!state.docs[key];
  return '<div class="doc' + (done ? ' done' : '') + '" id="doc-' + key + '">'
       + '<div class="icn"></div>' + pair[lang==='en'?0:1]
       + '<span class="tick">' + (done ? '✓' : '') + '</span>'
       + '<div class="docactions">'
       + '<span class="doclink" onclick="triggerShoot(\'' + key + '\',true)">' + (lang==='en' ? 'Take photo' : 'फोटो लें') + '</span>'
       + '<span class="doclink" onclick="triggerShoot(\'' + key + '\',false)">' + (lang==='en' ? 'Choose from gallery/files' : 'गैलरी/फ़ाइलों से चुनें') + '</span>'
       + '</div>'
       + '<input type="file" accept="image/*" capture="environment" id="file-cam-' + key + '" style="display:none" onchange="fileChosen(\'' + key + '\')">'
       + '<input type="file" accept="image/*" id="file-lib-' + key + '" style="display:none" onchange="fileChosen(\'' + key + '\')">'
       + '</div>';
}
function escAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function txt(id, type, dflt, extra){
  var v = state.fields.hasOwnProperty(id) ? state.fields[id] : dflt;
  return '<input type="' + type + '" id="' + id + '" value="' + escAttr(v) + '" oninput="onField(this)"' + (extra || '') + '>';
}
function getVal(id){
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function digitsOnly(s){ return s.replace(/\D/g, ''); }
function onField(el){
  state.fields[el.id] = el.value;
  el.classList.remove('err');
}

function pickChip(el, multi){
  if (multi) { el.classList.toggle('on'); return; }
  var sibs = el.parentNode.children;
  var wasOn = el.classList.contains('on');
  for (var i = 0; i < sibs.length; i++) sibs[i].classList.remove('on');
  if (!(wasOn && sibs.length === 1)) el.classList.add('on');
}
function dropPin(){ state.pin = true; render(); }
function triggerShoot(key, camera){
  document.getElementById((camera ? 'file-cam-' : 'file-lib-') + key).click();
}
function fileChosen(key){
  var cam = document.getElementById('file-cam-' + key);
  var lib = document.getElementById('file-lib-' + key);
  state.docs[key] = !!((cam.files && cam.files.length) || (lib.files && lib.files.length));
  render();
}
function toggleConfirm(){ state.confirmed = !state.confirmed; render(); }
function toggleMarried(){ state.unmarried = !state.unmarried; render(); }
function toggleAccept(){ state.accept = !state.accept; render(); }

function showBanner(){
  var b = document.getElementById('errbanner');
  if (!b) return;
  b.textContent = t('errmsg');
  b.classList.remove('hidden');
}
function hideBanner(){
  var b = document.getElementById('errbanner');
  if (b) b.classList.add('hidden');
}

function render(){
  var s = STEPS[step];
  document.getElementById('stepno').textContent = t('stepof').replace('#', step + 1);
  document.getElementById('steptitle').textContent = s.title[lang==='en'?0:1];
  document.getElementById('fill').style.width = ((step + 1) / 8 * 100) + '%';

  var last = step === STEPS.length - 1;
  var btn = last
    ? '<button class="cta" ' + (state.confirmed ? '' : 'disabled') + ' onclick="finish()">'
      + (lang==='en' ? 'Submit registration' : 'पंजीकरण जमा करें') + '</button>'
    : '<button class="cta" onclick="next()">' + t('cont') + '</button>';
  var back = step > 0 ? '<button class="back" onclick="prev()">← ' + t('back') + '</button>' : '';

  document.getElementById('body').innerHTML = '<div id="errbanner" class="errbanner hidden"></div>' + s.html() + btn + back;

  var n = '';
  for (var i = 0; i < s.notes.length; i++){
    n += '<p class="nk">' + s.notes[i][0][lang==='en'?0:1] + '</p>'
       + '<p class="nv">' + s.notes[i][1][lang==='en'?0:1] + '</p>';
  }
  document.getElementById('nbody').innerHTML = n;
  document.getElementById('ntitle').textContent = t('notes');
}

function next(){
  var s = STEPS[step];
  var body = document.getElementById('body');
  var prevErrs = body.querySelectorAll('.err');
  for (var i = 0; i < prevErrs.length; i++) prevErrs[i].classList.remove('err');

  var errs = s.validate ? s.validate() : [];
  if (errs.length){
    for (var j = 0; j < errs.length; j++){
      var el = document.getElementById(errs[j]);
      if (el) el.classList.add('err');
    }
    showBanner();
    var first = document.getElementById(errs[0]);
    if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
    return;
  }
  hideBanner();
  if (step < STEPS.length - 1){ step++; render(); window.scrollTo(0,0); }
}
function prev(){ if (step > 0){ step--; render(); window.scrollTo(0,0); } }

function finish(){
  if (!state.confirmed) return;
  document.getElementById('stepno').textContent = lang==='en' ? 'Enrolled' : 'दर्ज हुआ';
  document.getElementById('steptitle').textContent = lang==='en' ? 'Welcome to Foamico Gallery' : 'फोमिको गैलरी में स्वागत है';
  document.getElementById('fill').style.width = '100%';
  document.getElementById('body').innerHTML =

  + '<h4>' + (lang==='en' ? 'FOA-UP-LKO-0147' : 'FOA-UP-LKO-0147') + '</h4>'

      : 'यह आपका डीलर कोड है। गैलरी से जुड़े किसी भी सवाल के लिए इसे रखें।') + '</p>'
  + '<div class="wa"><span>' + (lang==='en' ? 'WhatsApp · just now' : 'व्हाट्सएप · अभी') + '</span><br>'
  + (lang==='en'
      ? 'Welcome, Ramesh ji. Your Foamico Gallery is registered as FOA-UP-LKO-0147.<br><br>Our team will call you within 48 hours to say hello and check a few details.<br><br>Your branding kit and 7 display mattresses arrive within 14 days.'
      : 'नमस्ते रमेश जी। आपकी फोमिको गैलरी FOA-UP-LKO-0147 के रूप में दर्ज हो गई है।<br><br>हमारी टीम 48 घंटे में आपसे बात करने और कुछ जानकारी जाँचने के लिए कॉल करेगी।<br><br>आपकी ब्रांडिंग किट और 7 डिस्प्ले गद्दे 14 दिन में पहुँचेंगे।')
  + '</div>'
  + '<button class="cta" style="margin-top:18px" onclick="restart()">'
  + (lang==='en' ? 'Start again' : 'फिर से शुरू करें') + '</button></div>';
  document.getElementById('nbody').innerHTML =
    '<p class="nk">' + (lang==='en' ? 'Within 30 seconds' : '30 सेकंड के भीतर') + '</p>'
  + '<p class="nv">' + (lang==='en'
      ? 'The dealer code is generated, the CRM task is created with a 48-hour clock, the distributor is notified, and the marketing kit enters the dispatch queue. Nobody types anything into a sheet.'
      : 'डीलर कोड बन जाता है, 48 घंटे की समय-सीमा के साथ सीआरएम कार्य बनता है, वितरक को सूचना जाती है, और मार्केटिंग किट डिस्पैच कतार में चली जाती है। कोई किसी शीट में कुछ नहीं टाइप करता।') + '</p>'
  + '<p class="nk">' + (lang==='en' ? 'The dealer\'s side' : 'डीलर की तरफ़') + '</p>'
  + '<p class="nv">' + (lang==='en'
      ? 'He has a reference number, a written record of what he agreed to, and a stated date for what arrives next. None of which he had with the paper form.'
      : 'उसके पास एक संदर्भ संख्या है, जो उसने स्वीकार किया उसका लिखित रिकॉर्ड है, और अगली चीज़ कब आएगी उसकी तय तारीख है। कागज़ी फॉर्म में इनमें से कुछ नहीं था।') + '</p>';
}
function restart(){ step = 0; state = { docs:{}, pin:false, confirmed:false, unmarried:false, accept:false, fields:{} }; render(); }

function setLang(l){
  lang = l;
  document.getElementById('l-en').className = l === 'en' ? 'on' : '';
  document.getElementById('l-hi').className = l === 'hi' ? 'on' : '';
  document.getElementById('notebtn').textContent =
    document.getElementById('notes').classList.contains('hidden') ? t('show') : t('hide');
  render();
}
function toggleNotes(){
  var n = document.getElementById('notes');
  n.classList.toggle('hidden');
  document.getElementById('notebtn').textContent = n.classList.contains('hidden') ? t('show') : t('hide');
}

render();
</script>
